openapi: 3.0.0
info:
  title: API Procesamiento de Pagos
  version: 1.0.0
  description: Endpoint para procesar pagos con Visa y Mastercard

servers:
  - url: http://localhost:3100
    description: Servidor local

paths:
  /api/v1/pay:
    post:
      summary: Procesar un pago con tarjeta
      description: Valida y enruta el pago a Visa o Mastercard según la franquicia enviada en el payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PagoRequest'
            examples:
              visa:
                summary: Pago con Visa
                value:
                  tarjeta:
                    pan_number: "4111111111111111"
                    cvv: "123"
                    franquicia: VISA
              mastercard:
                summary: Pago con Mastercard
                value:
                  tarjeta:
                    pan_number: "5500005555555559"
                    cvv: "321"
                    franquicia: MASTERCARD
      responses:
        '200':
          description: Pago procesado (aprobado o rechazado por la pasarela)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RespuestaVisa'
                  - $ref: '#/components/schemas/RespuestaMastercard'
        '400':
          description: Datos de tarjeta inválidos o tarjeta no soportada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRequest'
              examples:
                datosInsuficientes:
                  value:
                    error: Datos de tarjeta insuficientes
                numeroInvalido:
                  value:
                    error: Número de tarjeta inválido
                noSoportada:
                  value:
                    error: Tarjeta no soportada
        '502':
          description: Error al conectar con la pasarela
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorGateway'

components:
  schemas:
    Tarjeta:
      type: object
      required:
        - pan_number
        - cvv
        - franquicia
      properties:
        pan_number:
          type: string
          minLength: 16
          maxLength: 16
          example: "4111111111111111"
        cvv:
          type: string
          example: "123"
        franquicia:
          type: string
          enum: [VISA, MASTERCARD]
          example: VISA

    PagoRequest:
      type: object
      required:
        - tarjeta
      properties:
        tarjeta:
          $ref: '#/components/schemas/Tarjeta'

    RespuestaVisa:
      type: object
      properties:
        transaction_status:
          type: string
          enum: [APPROVED, DECLINED, ERROR]
          example: APPROVED
        details:
          type: string
          example: Pago aprobado por Visa
        auth_code:
          type: string
          example: V-0000

    RespuestaMastercard:
      type: object
      properties:
        payment_status:
          type: string
          enum: [OK, FAILED]
          example: OK
        description:
          type: string
          example: Pago aprobado por Mastercard
        auth_ref:
          type: string
          example: MC-9999

    ErrorRequest:
      type: object
      properties:
        error:
          type: string

    ErrorGateway:
      type: object
      properties:
        error:
          type: string
          example: Error al procesar el pago